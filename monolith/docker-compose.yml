services:
  app:
    build: .
    container_name: groupsapp_app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://postgres:password123@db:5432/groupsapp
      - JWT_SECRET=supersecretkey123
      - REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - ./public/uploads:/app/public/uploads

  db:
    image: postgres:15
    container_name: groupsapp_db
    environment:
      POSTGRES_DB: groupsapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: groupsapp_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
