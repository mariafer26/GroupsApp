<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>GroupsApp - Mis Grupos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: url('/planteal.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .navbar h1 {
            color: #fff;
            font-size: 22px;
        }

        .navbar .user {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .navbar button {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            padding: 6px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .navbar button:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 9px;
            cursor: pointer;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.2s;
            border: none;
            background: none;
        }

        .tab.active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: bold;
        }

        /* Formularios */
        .form-box {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .form-box h2 {
            color: #fff;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .form-box input {
            width: 100%;
            padding: 10px 15px;
            margin: 6px 0;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .form-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-box input:focus {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.2);
        }

        .form-box button.btn-main {
            width: 100%;
            padding: 11px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s, transform 0.1s;
        }

        .form-box button.btn-main:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        /* Lista grupos */
        .grupos-titulo {
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
            margin-bottom: 15px;
        }

        .grupo-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .grupo-card:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .grupo-card .info {
            cursor: pointer;
            flex: 1;
        }

        .grupo-card .nombre {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
        }

        .grupo-card .desc {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            margin-top: 3px;
        }

        .btn-codigo {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
            margin-left: 10px;
            transition: background 0.2s;
        }

        .btn-codigo:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Modal código */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: rgba(30, 30, 40, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .modal h3 {
            color: #fff;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .codigo-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px dashed rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 4px;
            margin: 15px 0;
        }

        .link-box {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            word-break: break-all;
            margin-bottom: 15px;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
        }

        .modal-btns button {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            border: none;
        }

        .btn-copiar {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }

        .btn-cerrar {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
        }

        .empty {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 40px;
            font-size: 15px;
        }

        .error {
            background: rgba(192, 57, 43, 0.25);
            color: #ff6b6b;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }

        .success {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <h1> GroupsApp</h1>
        <span class="user" id="nombreUsuario"></span>
        <button onclick="cerrarSesion()">Cerrar sesión</button>
    </div>

    <div class="container">

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" id="tab-crear" onclick="mostrarTab('crear')">➕ Crear grupo</button>
            <button class="tab" id="tab-unirse" onclick="mostrarTab('unirse')">🔗 Unirse con código</button>
        </div>

        <!-- Crear grupo -->
        <div class="form-box" id="form-crear">
            <h2>Nuevo grupo</h2>
            <input id="nombreGrupo" type="text" placeholder="Nombre del grupo" />
            <input id="descGrupo" type="text" placeholder="Descripción (opcional)" />
            <select id="tipoGrupo" style="
              width: 100%;
              padding: 10px 15px;
              margin: 6px 0;
              border: 1px solid rgba(255, 255, 255, 0.3);
              border-radius: 10px;
              font-size: 14px;
              outline: none;
              background: rgba(255, 255, 255, 0.12);
              color: white;
              cursor: pointer;
            ">
                <option value="public" style="color:#333">🌐 Público — cualquiera con el código puede unirse</option>
                <option value="approval" style="color:#333">✋ Con aprobación — el admin aprueba cada solicitud</option>
            </select>
            <button class="btn-main" onclick="crearGrupo()">Crear grupo</button>
            <div class="error" id="errorCrear"></div>
        </div>

        <!-- Unirse con código -->
        <div class="form-box" id="form-unirse" style="display:none;">
            <h2>Unirse a un grupo</h2>
            <input id="codigoInput" type="text" placeholder="Escribe el código del grupo" maxlength="8"
                style="letter-spacing:3px; font-size:18px; text-align:center;" />
            <button class="btn-main" onclick="unirseConCodigo()">Unirme</button>
            <div class="error" id="errorUnirse"></div>
            <div class="success" id="successUnirse"></div>
        </div>

        <!-- Lista de grupos -->
        <p class="grupos-titulo">Mis grupos</p>
        <div id="listaGrupos">
            <div class="empty">Cargando grupos...</div>
        </div>

    </div>

    <!-- Modal código -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3> Código de invitación</h3>
            <p style="color:#aaa; font-size:13px;">Comparte este código para que otros se unan</p>
            <div class="codigo-box" id="modalCodigo"></div>
            <div class="modal-btns">
                <button class="btn-cerrar" onclick="cerrarModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Modal solicitudes de unión -->
    <div class="modal-overlay" id="modalSolicitudes">
        <div class="modal" style="max-width:480px; text-align:left;">
            <h3 style="text-align:center;"> Solicitudes de unión</h3>
            <p style="color:#aaa; font-size:13px; text-align:center; margin-bottom:15px;">Aprueba o rechaza las
                solicitudes pendientes</p>
            <div id="listaSolicitudes" style="max-height:320px; overflow-y:auto;"></div>
            <div style="margin-top:15px; text-align:center;">
                <button class="btn-cerrar" onclick="cerrarModalSolicitudes()"
                    style="padding:10px 24px; border-radius:10px; cursor:pointer; background:rgba(255,255,255,0.1); border:none; color:#aaa;">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        if (!token) window.location.href = '/login.html';

        document.getElementById('nombreUsuario').textContent = '👤 ' + username;
        cargarGrupos();

        function mostrarTab(tab) {
            document.getElementById('form-crear').style.display = tab === 'crear' ? 'block' : 'none';
            document.getElementById('form-unirse').style.display = tab === 'unirse' ? 'block' : 'none';
            document.getElementById('tab-crear').classList.toggle('active', tab === 'crear');
            document.getElementById('tab-unirse').classList.toggle('active', tab === 'unirse');
        }

        async function cargarGrupos() {
            try {
                const response = await fetch('/api/groups/my', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                const lista = document.getElementById('listaGrupos');

                if (!data.groups || data.groups.length === 0) {
                    lista.innerHTML = '<div class="empty">No tienes grupos todavía. ¡Crea uno!</div>';
                    return;
                }

                lista.innerHTML = '';
                data.groups.forEach(grupo => {
                    if (!grupo) return;
                    const div = document.createElement('div');
                    div.className = 'grupo-card';
                    const userId = localStorage.getItem('userId');
                    const esAdmin = grupo.adminId === userId;
                    const esAprobacion = grupo.subscriptionType === 'approval';
                    const iconoTipo = esAprobacion ? '✋' : '🌐';

                    div.innerHTML = `
            <div class="info" onclick="abrirGrupo('${grupo.id}', '${grupo.name}')">
              <div class="nombre"> ${grupo.name} ${iconoTipo}</div>
              <div class="desc">${grupo.description || 'Sin descripción'}</div>
            </div>
            <div style="display:flex; gap:6px; flex-shrink:0;">
              ${esAdmin && esAprobacion ? `<button class="btn-codigo" style="background:rgba(244,143,177,0.25); border-color:rgba(244,143,177,0.5);" onclick="verSolicitudes('${grupo.id}', '${grupo.name}')"> Solicitudes</button>` : ''}
              <button class="btn-codigo" onclick="generarCodigo('${grupo.id}')"> Código</button>
            </div>
          `;
                    lista.appendChild(div);
                });
            } catch (error) { console.error(error); }
        }

        function abrirGrupo(id, nombre) {
            localStorage.setItem('grupoId', id);
            localStorage.setItem('grupoNombre', nombre);
            window.location.href = '/canales.html';
        }

        async function crearGrupo() {
            const name = document.getElementById('nombreGrupo').value.trim();
            const description = document.getElementById('descGrupo').value.trim();
            const subscriptionType = document.getElementById('tipoGrupo').value;
            document.getElementById('errorCrear').style.display = 'none';

            if (!name) { mostrarError('errorCrear', 'El nombre es obligatorio'); return; }

            try {
                const response = await fetch('/api/groups', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ name, description, subscriptionType })
                });
                const data = await response.json();
                if (!response.ok) { mostrarError('errorCrear', data.error); return; }

                document.getElementById('nombreGrupo').value = '';
                document.getElementById('descGrupo').value = '';
                document.getElementById('tipoGrupo').value = 'public';
                cargarGrupos();
            } catch (e) { mostrarError('errorCrear', 'Error de conexión'); }
        }

        async function unirseConCodigo() {
            const code = document.getElementById('codigoInput').value.trim();
            document.getElementById('errorUnirse').style.display = 'none';
            document.getElementById('successUnirse').style.display = 'none';

            if (!code) { mostrarError('errorUnirse', 'Escribe un código'); return; }

            try {
                const response = await fetch(`/api/groups/join/${code}`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();

                if (!response.ok) { mostrarError('errorUnirse', data.error); return; }

                document.getElementById('successUnirse').textContent = data.message;
                document.getElementById('successUnirse').style.display = 'block';
                document.getElementById('codigoInput').value = '';
                setTimeout(() => cargarGrupos(), 1000);
            } catch (e) { mostrarError('errorUnirse', 'Error de conexión'); }
        }

        async function generarCodigo(grupoId) {
            try {
                const response = await fetch(`/api/groups/${grupoId}/invite`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();

                document.getElementById('modalCodigo').textContent = data.inviteCode;
                document.getElementById('modalOverlay').classList.add('show');
            } catch (e) { alert('Error al generar código'); }
        }

        async function verSolicitudes(grupoId, grupoNombre) {
            document.getElementById('modalSolicitudes').classList.add('show');
            document.getElementById('listaSolicitudes').innerHTML = '<p style="color:#aaa; text-align:center;">Cargando...</p>';
            await cargarSolicitudes(grupoId);
        }

        let grupoIdActual = null;
        async function cargarSolicitudes(grupoId) {
            grupoIdActual = grupoId;
            try {
                const response = await fetch(`/api/groups/${grupoId}/requests`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                const lista = document.getElementById('listaSolicitudes');

                if (!data.requests || data.requests.length === 0) {
                    lista.innerHTML = '<p style="color:#aaa; text-align:center; padding:20px;">No hay solicitudes pendientes ✨</p>';
                    return;
                }

                lista.innerHTML = data.requests.map(r => `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 12px; margin-bottom:8px; background:rgba(255,255,255,0.08); border-radius:10px;">
                        <div>
                            <div style="color:#fff; font-weight:bold;">👤 ${r.User?.username || 'Usuario'}</div>
                            <div style="color:#aaa; font-size:12px;">${r.User?.email || ''}</div>
                        </div>
                        <div style="display:flex; gap:8px;">
                            <button onclick="responderSolicitud('${r.id}', 'approve')" style="background:rgba(46,204,113,0.25); border:1px solid rgba(46,204,113,0.5); color:#2ecc71; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:13px;">✓ Aceptar</button>
                            <button onclick="responderSolicitud('${r.id}', 'reject')" style="background:rgba(231,76,60,0.2); border:1px solid rgba(231,76,60,0.4); color:#e74c3c; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:13px;">✕ Rechazar</button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('listaSolicitudes').innerHTML = '<p style="color:#e74c3c; text-align:center;">Error al cargar solicitudes</p>';
            }
        }

        async function responderSolicitud(requestId, action) {
            try {
                await fetch(`/api/groups/${grupoIdActual}/requests/${requestId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ action })
                });
                await cargarSolicitudes(grupoIdActual);
            } catch (e) { alert('Error al procesar la solicitud'); }
        }

        function cerrarModalSolicitudes() {
            document.getElementById('modalSolicitudes').classList.remove('show');
            grupoIdActual = null;
        }

        function copiarLink() {
            const code = document.getElementById('modalCodigo').textContent;
            navigator.clipboard.writeText(code);
            alert('¡Código copiado al portapapeles!');
        }

        function cerrarModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = '/login.html';
        }

        function mostrarError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
</body>

</html>
