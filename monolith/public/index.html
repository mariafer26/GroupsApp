<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>GroupsApp</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @font-face {
            font-family: 'Compressa VF';
            src: url('https://res.cloudinary.com/dr6lvwubh/raw/upload/v1529908256/CompressaPRO-GX.woff2');
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #000;
            min-height: 150vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow: hidden;
            padding-top: 12vh;
        }

        /* LiquidEther background */
        #liquidEther {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            touch-action: none;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
        }

        .logo {
            font-size: 80px;
            margin-bottom: 10px;
            animation: flotar-logo 3s ease-in-out infinite;
        }

        @keyframes flotar-logo {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        /* TextPressure container */
        .text-pressure-wrap {
            position: relative;
            width: 100%;
            height: 120px;
            margin-bottom: 10px;
        }

        .text-pressure-title {
            font-family: 'Compressa VF', sans-serif;
            text-transform: uppercase;
            color: #ffffff;
            margin: 0;
            text-align: center;
            user-select: none;
            white-space: nowrap;
            font-weight: 100;
            width: 100%;
            display: flex;
            justify-content: space-between;
        }

        .text-pressure-title span {
            display: inline-block;
            transition: font-variation-settings 0.05s ease;
        }

        p.subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            margin-bottom: 20px;
        }

        .btns {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 200px;
        }

        .btn-primary {
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.3);
        }

        .btn-secondary {
            padding: 15px 40px;
            background: transparent;
            color: rgba(255, 255, 255, 0.85);
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>

    <!-- LiquidEther WebGL Background -->
    <div id="liquidEther"></div>

    <div class="content">
        <div class="logo"></div>

        <!-- TextPressure title -->
        <div class="text-pressure-wrap" id="textPressureWrap">
            <h1 class="text-pressure-title" id="textPressureTitle"></h1>
        </div>


        <div class="btns">
            <a href="/register.html" class="btn-primary">Crear cuenta</a>
            <a href="/login.html" class="btn-secondary">Iniciar sesión</a>
        </div>


    </div>

    <script>
        // =====================================================
        // LiquidEther – vanilla JS port (Three.js fluid sim)
        // =====================================================
        (function () {
            const COLORS = ['#5227FF', '#FF9FFC', '#B19EEF'];
            const MOUSE_FORCE = 20;
            const CURSOR_SIZE = 100;
            const IS_VISCOUS = true;
            const VISCOUS = 30;
            const ITER_VISCOUS = 32;
            const ITER_POISSON = 32;
            const DT = 0.014;
            const USE_BFECC = true;
            const RESOLUTION = 0.5;
            const IS_BOUNCE = false;
            const AUTO_DEMO = true;
            const AUTO_SPEED = 0.5;
            const AUTO_INTENSITY = 2.2;
            const TAKEOVER_DUR = 0.25;
            const AUTO_RESUME_DELAY = 3000;
            const AUTO_RAMP_DUR = 0.6;

            // Palette texture
            function makePaletteTexture(stops) {
                const arr = stops.length === 1 ? [stops[0], stops[0]] : stops;
                const w = arr.length;
                const data = new Uint8Array(w * 4);
                for (let i = 0; i < w; i++) {
                    const c = new THREE.Color(arr[i]);
                    data[i * 4] = Math.round(c.r * 255);
                    data[i * 4 + 1] = Math.round(c.g * 255);
                    data[i * 4 + 2] = Math.round(c.b * 255);
                    data[i * 4 + 3] = 255;
                }
                const tex = new THREE.DataTexture(data, w, 1, THREE.RGBAFormat);
                tex.magFilter = THREE.LinearFilter;
                tex.minFilter = THREE.LinearFilter;
                tex.wrapS = THREE.ClampToEdgeWrapping;
                tex.wrapT = THREE.ClampToEdgeWrapping;
                tex.needsUpdate = true;
                return tex;
            }
            const paletteTex = makePaletteTexture(COLORS);
            const bgVec4 = new THREE.Vector4(0, 0, 0, 1);

            // ---- Shaders ----
            const face_vert = `attribute vec3 position;uniform vec2 px;uniform vec2 boundarySpace;varying vec2 uv;precision highp float;void main(){vec3 pos=position;vec2 scale=1.0-boundarySpace*2.0;pos.xy=pos.xy*scale;uv=vec2(0.5)+(pos.xy)*0.5;gl_Position=vec4(pos,1.0);}`;
            const line_vert = `attribute vec3 position;uniform vec2 px;precision highp float;varying vec2 uv;void main(){vec3 pos=position;uv=0.5+pos.xy*0.5;vec2 n=sign(pos.xy);pos.xy=abs(pos.xy)-px*1.0;pos.xy*=n;gl_Position=vec4(pos,1.0);}`;
            const mouse_vert = `precision highp float;attribute vec3 position;attribute vec2 uv;uniform vec2 center;uniform vec2 scale;uniform vec2 px;varying vec2 vUv;void main(){vec2 pos=position.xy*scale*2.0*px+center;vUv=uv;gl_Position=vec4(pos,0.0,1.0);}`;

            const advection_frag = `precision highp float;uniform sampler2D velocity;uniform float dt;uniform bool isBFECC;uniform vec2 fboSize;uniform vec2 px;varying vec2 uv;void main(){vec2 ratio=max(fboSize.x,fboSize.y)/fboSize;if(isBFECC==false){vec2 vel=texture2D(velocity,uv).xy;vec2 uv2=uv-vel*dt*ratio;vec2 nv=texture2D(velocity,uv2).xy;gl_FragColor=vec4(nv,0.0,0.0);}else{vec2 sn=uv;vec2 vo=texture2D(velocity,uv).xy;vec2 so=sn-vo*dt*ratio;vec2 vn1=texture2D(velocity,so).xy;vec2 sn2=so+vn1*dt*ratio;vec2 err=sn2-sn;vec2 sn3=sn-err/2.0;vec2 v2=texture2D(velocity,sn3).xy;vec2 so2=sn3-v2*dt*ratio;vec2 nv2=texture2D(velocity,so2).xy;gl_FragColor=vec4(nv2,0.0,0.0);}}`;
            const color_frag = `precision highp float;uniform sampler2D velocity;uniform sampler2D palette;uniform vec4 bgColor;varying vec2 uv;void main(){vec2 vel=texture2D(velocity,uv).xy;float lenv=clamp(length(vel),0.0,1.0);vec3 c=texture2D(palette,vec2(lenv,0.5)).rgb;vec3 outRGB=mix(bgColor.rgb,c,lenv);float outA=mix(bgColor.a,1.0,lenv);gl_FragColor=vec4(outRGB,outA);}`;
            const divergence_frag = `precision highp float;uniform sampler2D velocity;uniform float dt;uniform vec2 px;varying vec2 uv;void main(){float x0=texture2D(velocity,uv-vec2(px.x,0.0)).x;float x1=texture2D(velocity,uv+vec2(px.x,0.0)).x;float y0=texture2D(velocity,uv-vec2(0.0,px.y)).y;float y1=texture2D(velocity,uv+vec2(0.0,px.y)).y;float d=(x1-x0+y1-y0)/2.0;gl_FragColor=vec4(d/dt);}`;
            const externalForce_frag = `precision highp float;uniform vec2 force;uniform vec2 center;uniform vec2 scale;uniform vec2 px;varying vec2 vUv;void main(){vec2 circle=(vUv-0.5)*2.0;float d=1.0-min(length(circle),1.0);d*=d;gl_FragColor=vec4(force*d,0.0,1.0);}`;
            const poisson_frag = `precision highp float;uniform sampler2D pressure;uniform sampler2D divergence;uniform vec2 px;varying vec2 uv;void main(){float p0=texture2D(pressure,uv+vec2(px.x*2.0,0.0)).r;float p1=texture2D(pressure,uv-vec2(px.x*2.0,0.0)).r;float p2=texture2D(pressure,uv+vec2(0.0,px.y*2.0)).r;float p3=texture2D(pressure,uv-vec2(0.0,px.y*2.0)).r;float div=texture2D(divergence,uv).r;float nP=(p0+p1+p2+p3)/4.0-div;gl_FragColor=vec4(nP);}`;
            const pressure_frag = `precision highp float;uniform sampler2D pressure;uniform sampler2D velocity;uniform vec2 px;uniform float dt;varying vec2 uv;void main(){float s=1.0;float p0=texture2D(pressure,uv+vec2(px.x*s,0.0)).r;float p1=texture2D(pressure,uv-vec2(px.x*s,0.0)).r;float p2=texture2D(pressure,uv+vec2(0.0,px.y*s)).r;float p3=texture2D(pressure,uv-vec2(0.0,px.y*s)).r;vec2 v=texture2D(velocity,uv).xy;vec2 gP=vec2(p0-p1,p2-p3)*0.5;v=v-gP*dt;gl_FragColor=vec4(v,0.0,1.0);}`;
            const viscous_frag = `precision highp float;uniform sampler2D velocity;uniform sampler2D velocity_new;uniform float v;uniform vec2 px;uniform float dt;varying vec2 uv;void main(){vec2 old=texture2D(velocity,uv).xy;vec2 n0=texture2D(velocity_new,uv+vec2(px.x*2.0,0.0)).xy;vec2 n1=texture2D(velocity_new,uv-vec2(px.x*2.0,0.0)).xy;vec2 n2=texture2D(velocity_new,uv+vec2(0.0,px.y*2.0)).xy;vec2 n3=texture2D(velocity_new,uv-vec2(0.0,px.y*2.0)).xy;vec2 nv=4.0*old+v*dt*(n0+n1+n2+n3);nv/=4.0*(1.0+v*dt);gl_FragColor=vec4(nv,0.0,0.0);}`;

            // ---- Common ----
            const Common = { width: 1, height: 1, aspect: 1, renderer: null, clock: null, time: 0, delta: 0 };
            Common.init = function (el) {
                this.pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
                const r = el.getBoundingClientRect();
                this.width = Math.max(1, Math.floor(r.width));
                this.height = Math.max(1, Math.floor(r.height));
                this.aspect = this.width / this.height;
                this.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
                this.renderer.autoClear = false;
                this.renderer.setClearColor(0x000000, 1);
                this.renderer.setPixelRatio(this.pixelRatio);
                this.renderer.setSize(this.width, this.height);
                this.renderer.domElement.style.cssText = 'width:100%;height:100%;display:block;';
                this.clock = new THREE.Clock(); this.clock.start();
            };
            Common.resize = function () {
                const el = this.renderer.domElement.parentNode;
                if (!el) return;
                const r = el.getBoundingClientRect();
                this.width = Math.max(1, Math.floor(r.width));
                this.height = Math.max(1, Math.floor(r.height));
                this.aspect = this.width / this.height;
                this.renderer.setSize(this.width, this.height, false);
            };
            Common.update = function () { this.delta = this.clock.getDelta(); this.time += this.delta; };

            // ---- Mouse ----
            const Mouse = {
                mouseMoved: false, coords: new THREE.Vector2(), coords_old: new THREE.Vector2(),
                diff: new THREE.Vector2(), container: null, isHoverInside: false, hasUserControl: false,
                isAutoActive: false, autoIntensity: AUTO_INTENSITY, takeoverActive: false,
                takeoverStartTime: 0, takeoverDuration: TAKEOVER_DUR,
                takeoverFrom: new THREE.Vector2(), takeoverTo: new THREE.Vector2(), onInteract: null
            };
            Mouse.init = function (el) {
                this.container = el;
                window.addEventListener('mousemove', e => {
                    const r = el.getBoundingClientRect();
                    if (r.width === 0 || r.height === 0) return;
                    this.isHoverInside = e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
                    if (!this.isHoverInside) return;
                    if (this.onInteract) this.onInteract();
                    if (this.isAutoActive && !this.hasUserControl && !this.takeoverActive) {
                        const nx = (e.clientX - r.left) / r.width, ny = (e.clientY - r.top) / r.height;
                        this.takeoverFrom.copy(this.coords);
                        this.takeoverTo.set(nx * 2 - 1, -(ny * 2 - 1));
                        this.takeoverStartTime = performance.now();
                        this.takeoverActive = true;
                        this.hasUserControl = true;
                        this.isAutoActive = false;
                        return;
                    }
                    const nx = (e.clientX - r.left) / r.width, ny = (e.clientY - r.top) / r.height;
                    this.coords.set(nx * 2 - 1, -(ny * 2 - 1));
                    this.mouseMoved = true;
                    this.hasUserControl = true;
                });
                window.addEventListener('touchmove', e => {
                    if (e.touches.length !== 1) return;
                    const t = e.touches[0], r = el.getBoundingClientRect();
                    if (r.width === 0 || r.height === 0) return;
                    this.isHoverInside = t.clientX >= r.left && t.clientX <= r.right && t.clientY >= r.top && t.clientY <= r.bottom;
                    if (!this.isHoverInside) return;
                    if (this.onInteract) this.onInteract();
                    const nx = (t.clientX - r.left) / r.width, ny = (t.clientY - r.top) / r.height;
                    this.coords.set(nx * 2 - 1, -(ny * 2 - 1));
                    this.mouseMoved = true;
                    this.hasUserControl = true;
                }, { passive: true });
                window.addEventListener('touchend', () => { this.isHoverInside = false; });
            };
            Mouse.setNormalized = function (nx, ny) { this.coords.set(nx, ny); this.mouseMoved = true; };
            Mouse.update = function () {
                if (this.takeoverActive) {
                    const t = (performance.now() - this.takeoverStartTime) / (this.takeoverDuration * 1000);
                    if (t >= 1) { this.takeoverActive = false; this.coords.copy(this.takeoverTo); this.coords_old.copy(this.coords); this.diff.set(0, 0); }
                    else { const k = t * t * (3 - 2 * t); this.coords.copy(this.takeoverFrom).lerp(this.takeoverTo, k); }
                }
                this.diff.subVectors(this.coords, this.coords_old);
                this.coords_old.copy(this.coords);
                if (this.coords_old.x === 0 && this.coords_old.y === 0) this.diff.set(0, 0);
                if (this.isAutoActive && !this.takeoverActive) this.diff.multiplyScalar(this.autoIntensity);
            };

            // ---- AutoDriver ----
            function AutoDriver(mouse, mgr, opts) {
                this.mouse = mouse; this.mgr = mgr; this.enabled = opts.enabled; this.speed = opts.speed;
                this.resumeDelay = opts.resumeDelay || 3000; this.rampMs = (opts.rampDuration || 0) * 1000;
                this.active = false; this.current = new THREE.Vector2(0, 0); this.target = new THREE.Vector2();
                this.lastTime = performance.now(); this.activationTime = 0; this.margin = 0.2;
                this._dir = new THREE.Vector2(); this.pickTarget();
            }
            AutoDriver.prototype.pickTarget = function () {
                this.target.set((Math.random() * 2 - 1) * (1 - this.margin), (Math.random() * 2 - 1) * (1 - this.margin));
            };
            AutoDriver.prototype.forceStop = function () { this.active = false; this.mouse.isAutoActive = false; };
            AutoDriver.prototype.update = function () {
                if (!this.enabled) return;
                const now = performance.now(), idle = now - this.mgr.lastUserInteraction;
                if (idle < this.resumeDelay) { if (this.active) this.forceStop(); return; }
                if (this.mouse.isHoverInside) { if (this.active) this.forceStop(); return; }
                if (!this.active) { this.active = true; this.current.copy(this.mouse.coords); this.lastTime = now; this.activationTime = now; }
                this.mouse.isAutoActive = true;
                let dt = (now - this.lastTime) / 1000; this.lastTime = now; if (dt > 0.2) dt = 0.016;
                const dir = this._dir.subVectors(this.target, this.current), dist = dir.length();
                if (dist < 0.01) { this.pickTarget(); return; }
                dir.normalize();
                let ramp = 1; if (this.rampMs > 0) { const t = Math.min(1, (now - this.activationTime) / this.rampMs); ramp = t * t * (3 - 2 * t); }
                this.current.addScaledVector(dir, Math.min(this.speed * dt * ramp, dist));
                this.mouse.setNormalized(this.current.x, this.current.y);
            };

            // ---- ShaderPass ----
            function ShaderPass(props) { this.props = props || {}; this.uniforms = this.props.material?.uniforms; }
            ShaderPass.prototype.init = function () {
                this.scene = new THREE.Scene(); this.camera = new THREE.Camera();
                if (this.uniforms) {
                    this.material = new THREE.RawShaderMaterial(this.props.material);
                    this.plane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), this.material);
                    this.scene.add(this.plane);
                }
            };
            ShaderPass.prototype.update = function () {
                Common.renderer.setRenderTarget(this.props.output || null);
                Common.renderer.render(this.scene, this.camera);
                Common.renderer.setRenderTarget(null);
            };

            // ---- Advection ----
            function Advection(sp) {
                ShaderPass.call(this, {
                    material: {
                        vertexShader: face_vert, fragmentShader: advection_frag, uniforms: {
                            boundarySpace: { value: sp.cellScale }, px: { value: sp.cellScale }, fboSize: { value: sp.fboSize },
                            velocity: { value: sp.src.texture }, dt: { value: sp.dt }, isBFECC: { value: true }
                        }
                    }, output: sp.dst
                });
                this.uniforms = this.props.material.uniforms; this.init();
                // boundary lines
                const bg = new THREE.BufferGeometry();
                bg.setAttribute('position', new THREE.BufferAttribute(new Float32Array([-1, -1, 0, -1, 1, 0, -1, 1, 0, 1, 1, 0, 1, 1, 0, 1, -1, 0, 1, -1, 0, -1, -1, 0]), 3));
                this.line = new THREE.LineSegments(bg, new THREE.RawShaderMaterial({ vertexShader: line_vert, fragmentShader: advection_frag, uniforms: this.uniforms }));
                this.scene.add(this.line);
            }
            Advection.prototype = Object.create(ShaderPass.prototype);
            Advection.prototype.update = function (o) { this.uniforms.dt.value = o.dt; this.line.visible = o.isBounce; this.uniforms.isBFECC.value = o.BFECC; ShaderPass.prototype.update.call(this); };

            // ---- ExternalForce ----
            function ExternalForce(sp) { ShaderPass.call(this, { output: sp.dst }); this._init(sp); }
            ExternalForce.prototype = Object.create(ShaderPass.prototype);
            ExternalForce.prototype._init = function (sp) {
                ShaderPass.prototype.init.call(this);
                const m = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), new THREE.RawShaderMaterial({
                    vertexShader: mouse_vert, fragmentShader: externalForce_frag,
                    blending: THREE.AdditiveBlending, depthWrite: false,
                    uniforms: { px: { value: sp.cellScale }, force: { value: new THREE.Vector2() }, center: { value: new THREE.Vector2() }, scale: { value: new THREE.Vector2(sp.cursor_size, sp.cursor_size) } }
                }));
                this.mouse = m; this.scene.add(m);
            };
            ExternalForce.prototype.update = function (p) {
                const u = this.mouse.material.uniforms;
                u.force.value.set((Mouse.diff.x / 2) * p.mouse_force, (Mouse.diff.y / 2) * p.mouse_force);
                const csx = p.cursor_size * p.cellScale.x, csy = p.cursor_size * p.cellScale.y;
                u.center.value.set(Math.min(Math.max(Mouse.coords.x, -1 + csx + p.cellScale.x * 2), 1 - csx - p.cellScale.x * 2), Math.min(Math.max(Mouse.coords.y, -1 + csy + p.cellScale.y * 2), 1 - csy - p.cellScale.y * 2));
                u.scale.value.set(p.cursor_size, p.cursor_size);
                ShaderPass.prototype.update.call(this);
            };

            // ---- Viscous ----
            function ViscousPass(sp) {
                ShaderPass.call(this, {
                    material: {
                        vertexShader: face_vert, fragmentShader: viscous_frag, uniforms: {
                            boundarySpace: { value: sp.boundarySpace }, velocity: { value: sp.src.texture }, velocity_new: { value: sp.dst_.texture },
                            v: { value: sp.viscous }, px: { value: sp.cellScale }, dt: { value: sp.dt }
                        }
                    }, output: sp.dst, output0: sp.dst_, output1: sp.dst
                });
                this.init();
            }
            ViscousPass.prototype = Object.create(ShaderPass.prototype);
            ViscousPass.prototype.update = function (o) {
                let fi, fo; this.uniforms.v.value = o.viscous;
                for (let i = 0; i < o.iterations; i++) {
                    fi = i % 2 === 0 ? this.props.output0 : this.props.output1; fo = i % 2 === 0 ? this.props.output1 : this.props.output0;
                    this.uniforms.velocity_new.value = fi.texture; this.props.output = fo; this.uniforms.dt.value = o.dt;
                    ShaderPass.prototype.update.call(this);
                } return fo;
            };

            // ---- Divergence ----
            function Divergence(sp) {
                ShaderPass.call(this, {
                    material: {
                        vertexShader: face_vert, fragmentShader: divergence_frag, uniforms: {
                            boundarySpace: { value: sp.boundarySpace }, velocity: { value: sp.src.texture }, px: { value: sp.cellScale }, dt: { value: sp.dt }
                        }
                    }, output: sp.dst
                }); this.init();
            }
            Divergence.prototype = Object.create(ShaderPass.prototype);
            Divergence.prototype.update = function (o) { this.uniforms.velocity.value = o.vel.texture; ShaderPass.prototype.update.call(this); };

            // ---- Poisson ----
            function Poisson(sp) {
                ShaderPass.call(this, {
                    material: {
                        vertexShader: face_vert, fragmentShader: poisson_frag, uniforms: {
                            boundarySpace: { value: sp.boundarySpace }, pressure: { value: sp.dst_.texture }, divergence: { value: sp.src.texture }, px: { value: sp.cellScale }
                        }
                    }, output: sp.dst, output0: sp.dst_, output1: sp.dst
                }); this.init();
            }
            Poisson.prototype = Object.create(ShaderPass.prototype);
            Poisson.prototype.update = function (o) {
                let pi, po;
                for (let i = 0; i < o.iterations; i++) {
                    pi = i % 2 === 0 ? this.props.output0 : this.props.output1; po = i % 2 === 0 ? this.props.output1 : this.props.output0;
                    this.uniforms.pressure.value = pi.texture; this.props.output = po;
                    ShaderPass.prototype.update.call(this);
                } return po;
            };

            // ---- Pressure ----
            function PressurePass(sp) {
                ShaderPass.call(this, {
                    material: {
                        vertexShader: face_vert, fragmentShader: pressure_frag, uniforms: {
                            boundarySpace: { value: sp.boundarySpace }, pressure: { value: sp.src_p.texture }, velocity: { value: sp.src_v.texture }, px: { value: sp.cellScale }, dt: { value: sp.dt }
                        }
                    }, output: sp.dst
                }); this.init();
            }
            PressurePass.prototype = Object.create(ShaderPass.prototype);
            PressurePass.prototype.update = function (o) { this.uniforms.velocity.value = o.vel.texture; this.uniforms.pressure.value = o.pressure.texture; ShaderPass.prototype.update.call(this); };

            // ---- Simulation ----
            function Simulation() {
                this.fboSize = new THREE.Vector2(); this.cellScale = new THREE.Vector2(); this.boundarySpace = new THREE.Vector2();
                this.fbos = {}; this._init();
            }
            Simulation.prototype._init = function () {
                this.calcSize(); this.createFBOs(); this.createPasses();
            };
            Simulation.prototype.calcSize = function () {
                const w = Math.max(1, Math.round(RESOLUTION * Common.width)), h = Math.max(1, Math.round(RESOLUTION * Common.height));
                this.cellScale.set(1 / w, 1 / h); this.fboSize.set(w, h);
            };
            Simulation.prototype.createFBOs = function () {
                const isIOS = /(iPad|iPhone|iPod)/i.test(navigator.userAgent);
                const type = isIOS ? THREE.HalfFloatType : THREE.FloatType;
                const o = { type, depthBuffer: false, stencilBuffer: false, minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, wrapS: THREE.ClampToEdgeWrapping, wrapT: THREE.ClampToEdgeWrapping };
                ['vel_0', 'vel_1', 'vel_viscous0', 'vel_viscous1', 'div', 'pressure_0', 'pressure_1'].forEach(k => {
                    this.fbos[k] = new THREE.WebGLRenderTarget(this.fboSize.x, this.fboSize.y, o);
                });
            };
            Simulation.prototype.createPasses = function () {
                this.advection = new Advection({ cellScale: this.cellScale, fboSize: this.fboSize, dt: DT, src: this.fbos.vel_0, dst: this.fbos.vel_1 });
                this.externalForce = new ExternalForce({ cellScale: this.cellScale, cursor_size: CURSOR_SIZE, dst: this.fbos.vel_1 });
                this.viscous = new ViscousPass({ cellScale: this.cellScale, boundarySpace: this.boundarySpace, viscous: VISCOUS, src: this.fbos.vel_1, dst: this.fbos.vel_viscous1, dst_: this.fbos.vel_viscous0, dt: DT });
                this.divergence = new Divergence({ cellScale: this.cellScale, boundarySpace: this.boundarySpace, src: this.fbos.vel_viscous0, dst: this.fbos.div, dt: DT });
                this.poisson = new Poisson({ cellScale: this.cellScale, boundarySpace: this.boundarySpace, src: this.fbos.div, dst: this.fbos.pressure_1, dst_: this.fbos.pressure_0 });
                this.pressure = new PressurePass({ cellScale: this.cellScale, boundarySpace: this.boundarySpace, src_p: this.fbos.pressure_0, src_v: this.fbos.vel_viscous0, dst: this.fbos.vel_0, dt: DT });
            };
            Simulation.prototype.resize = function () {
                this.calcSize();
                for (let k in this.fbos) this.fbos[k].setSize(this.fboSize.x, this.fboSize.y);
            };
            Simulation.prototype.update = function () {
                if (!IS_BOUNCE) this.boundarySpace.copy(this.cellScale); else this.boundarySpace.set(0, 0);
                this.advection.update({ dt: DT, isBounce: IS_BOUNCE, BFECC: USE_BFECC });
                this.externalForce.update({ cursor_size: CURSOR_SIZE, mouse_force: MOUSE_FORCE, cellScale: this.cellScale });
                let vel = this.fbos.vel_1;
                if (IS_VISCOUS) vel = this.viscous.update({ viscous: VISCOUS, iterations: ITER_VISCOUS, dt: DT });
                this.divergence.update({ vel });
                const pr = this.poisson.update({ iterations: ITER_POISSON });
                this.pressure.update({ vel, pressure: pr });
            };

            // ---- Output ----
            function Output() {
                this.sim = new Simulation();
                this.scene = new THREE.Scene(); this.camera = new THREE.Camera();
                this.mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), new THREE.RawShaderMaterial({
                    vertexShader: face_vert, fragmentShader: color_frag, transparent: false, depthWrite: false,
                    uniforms: { velocity: { value: this.sim.fbos.vel_0.texture }, boundarySpace: { value: new THREE.Vector2() }, palette: { value: paletteTex }, bgColor: { value: bgVec4 } }
                }));
                this.scene.add(this.mesh);
            }
            Output.prototype.resize = function () { this.sim.resize(); };
            Output.prototype.update = function () {
                this.sim.update();
                Common.renderer.setRenderTarget(null);
                Common.renderer.render(this.scene, this.camera);
            };

            // ---- Init ----
            const el = document.getElementById('liquidEther');
            Common.init(el);
            Mouse.init(el);
            el.prepend(Common.renderer.domElement);

            const output = new Output();
            let lastUserInteraction = performance.now();
            Mouse.onInteract = () => { lastUserInteraction = performance.now(); if (autoDriver) autoDriver.forceStop(); };
            const autoDriver = new AutoDriver(Mouse, { lastUserInteraction }, { enabled: AUTO_DEMO, speed: AUTO_SPEED, resumeDelay: AUTO_RESUME_DELAY, rampDuration: AUTO_RAMP_DUR });
            // keep lastUserInteraction reference synced
            Object.defineProperty(autoDriver.mgr, 'lastUserInteraction', { get: () => lastUserInteraction });

            let running = true;
            function loop() {
                if (!running) return;
                autoDriver.update();
                Mouse.update();
                Common.update();
                output.update();
                requestAnimationFrame(loop);
            }
            loop();

            window.addEventListener('resize', () => { Common.resize(); output.resize(); });
        })();

        // =====================================================
        // TextPressure Effect (vanilla JS port)
        // =====================================================
        (function () {
            const TEXT = 'GroupsApp';
            const TEXT_COLOR = '#ffffff';
            const MIN_FONT_SIZE = 300;

            const wrap = document.getElementById('textPressureWrap');
            const title = document.getElementById('textPressureTitle');
            const chars = TEXT.split('');
            const spans = [];

            chars.forEach(char => {
                const span = document.createElement('span');
                span.textContent = char;
                span.setAttribute('data-char', char);
                span.style.color = TEXT_COLOR;
                title.appendChild(span);
                spans.push(span);
            });

            function setSize() {
                const containerW = wrap.getBoundingClientRect().width;
                let fontSize = containerW / (chars.length / 2);
                fontSize = Math.max(fontSize, MIN_FONT_SIZE);
                title.style.fontSize = fontSize + 'px';
                title.style.lineHeight = '1';
            }
            setSize();
            window.addEventListener('resize', setSize);

            const mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
            const cursor = { x: mouse.x, y: mouse.y };
            window.addEventListener('mousemove', e => { cursor.x = e.clientX; cursor.y = e.clientY; });
            window.addEventListener('touchmove', e => { cursor.x = e.touches[0].clientX; cursor.y = e.touches[0].clientY; }, { passive: true });

            function dist(a, b) { const dx = b.x - a.x, dy = b.y - a.y; return Math.sqrt(dx * dx + dy * dy); }
            function getAttr(d, maxD, minV, maxV) { return Math.max(minV, maxV - Math.abs((maxV * d) / maxD) + minV); }

            function animate() {
                mouse.x += (cursor.x - mouse.x) / 15;
                mouse.y += (cursor.y - mouse.y) / 15;
                const titleRect = title.getBoundingClientRect();
                const maxDist = titleRect.width / 2;
                spans.forEach(span => {
                    const rect = span.getBoundingClientRect();
                    const d = dist(mouse, { x: rect.x + rect.width / 2, y: rect.y + rect.height / 2 });
                    const wdth = Math.floor(getAttr(d, maxDist, 5, 200));
                    const wght = Math.floor(getAttr(d, maxDist, 100, 900));
                    const ital = getAttr(d, maxDist, 0, 1).toFixed(2);
                    span.style.fontVariationSettings = `'wght' ${wght}, 'wdth' ${wdth}, 'ital' ${ital}`;
                });
                requestAnimationFrame(animate);
            }
            animate();
        })();

        // Si ya está logueado, redirigir directo a grupos
        if (localStorage.getItem('token')) {
            window.location.href = '/grupos.html';
        }
    </script>
</body>
